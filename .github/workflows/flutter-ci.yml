name: Flutter CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Analyze, test, and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create CI environment file
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: printf 'NEWS_API_KEY=%s\n' "$NEWS_API_KEY" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare APK artifact
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          apk_name="daily-news-${safe_ref}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$apk_name"
          echo "APK_NAME=$apk_name" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-reader-release-apk
          path: ${{ env.APK_NAME }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$APK_NAME" \
            --title "Daily News $GITHUB_REF_NAME" \
            --notes "Release APK built by GitHub Actions."
